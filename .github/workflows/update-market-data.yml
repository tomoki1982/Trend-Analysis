name: Update Market Data

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "15 0 1 * *"
  workflow_dispatch:

concurrency:
  group: update-market-data-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-daily:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update daily indicators
        run: python scripts/fetch_indicators.py --refresh daily
      - name: Refresh from latest main and rebuild daily CSV
        run: |
          git fetch origin main
          git reset --hard origin/main
          python scripts/fetch_indicators.py --refresh daily
      - name: Commit CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_snapshot.csv
          git add data/history_daily_*.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "Update daily market data"
          git push origin HEAD:main

  update-monthly:
    needs: update-daily
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.schedule == '15 0 1 * *') && (needs.update-daily.result == 'success' || needs.update-daily.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update monthly indicators
        run: python scripts/fetch_indicators.py --refresh monthly
      - name: Build CGPI dashboard CSV
        run: python scripts/process_cgpi_zip.py
      - name: Refresh from latest main and rebuild monthly CSV
        run: |
          git fetch origin main
          git reset --hard origin/main
          python scripts/fetch_indicators.py --refresh monthly
          python scripts/process_cgpi_zip.py
      - name: Commit CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cgpi_dashboard.csv
          git add data/cgpi_*.csv
          git add data/cgpi_*_lite.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "Update monthly market data"
          git push origin HEAD:main
